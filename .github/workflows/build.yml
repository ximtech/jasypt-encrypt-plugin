name: build 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with: 
        fetch-depth: 0   # fetch full history + tags
    
    - name: Set Up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: 'gradle'

    - name: Make Gradlew Executable
      run: chmod +x ./gradlew
      
    - name: Show Previous Version
      run: ./gradlew currentVersion
    
    - name: Build And Test With Gradle Wrapper
      run: ./gradlew clean jacocoTestReport --info --stacktrace
      
    - name: Create Gradle Release
      run: ./gradlew release --info --stacktrace
    
    - name: Code Coverage Report
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./build/reports/jacoco/test/jacocoTestReport.xml
        fail_ci_if_error: true
        verbose: true
