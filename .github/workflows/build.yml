name: build 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  
env:
  GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
  GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with: 
        fetch-depth: 0   # fetch full history + tags
    
    - name: Set Up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'zulu'
        cache: 'gradle'

    - name: Make Gradlew Executable
      run: chmod +x ./gradlew
    
    - name: Build And Test With Gradle Wrapper
      run: ./gradlew clean jacocoTestReport --info --stacktrace
      
    - name: Code Coverage Report
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./build/reports/jacoco/test/jacocoTestReport.xml
        fail_ci_if_error: false
        verbose: true
        
    - name: Create Gradle Release And Publish To Gradle Central
      run: ./gradlew release publishPlugins --info --stacktrace

    - name: Get Current Tag Version
      run: echo "VERSION=$(./gradlew -q printVersion)" >> $GITHUB_ENV

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.VERSION }}
        generate_release_notes: true